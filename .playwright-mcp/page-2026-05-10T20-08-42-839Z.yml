        - paragraph [ref=e121]: Auth
        - heading "Three ways in. Subscription-first." [level=2] [ref=e122]
        - paragraph [ref=e123]: If you already pay Anthropic or OpenAI for a coding tool, you don't need to pay them twice.
      - generic [ref=e124]:
        - generic [ref=e125]:
          - heading "Claude Code OAuth" [level=3] [ref=e126]
          - paragraph [ref=e127]: Reuses your Claude Pro / Max subscription via the Claude Code login. macOS Keychain or ~/.claude/.credentials.json.
          - generic [ref=e128]: "claude login # then: voss --auth=claude do ..."
        - generic [ref=e129]:
          - heading "Codex / ChatGPT OAuth" [level=3] [ref=e130]
          - paragraph [ref=e131]: Reuses your ChatGPT subscription via the Codex CLI auth file. Tokens auto-refresh.
          - generic [ref=e132]: "codex login # then: voss --auth=codex do ..."
        - generic [ref=e133]:
          - heading "Plain API key" [level=3] [ref=e134]
          - paragraph [ref=e135]: Drop ANTHROPIC_API_KEY or OPENAI_API_KEY in the env. Useful for CI.
          - generic [ref=e136]: export ANTHROPIC_API_KEY=sk-ant-...
