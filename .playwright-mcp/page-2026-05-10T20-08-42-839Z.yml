      - generic [ref=e30]:
        - paragraph [ref=e31]: "01"
        - paragraph [ref=e32]: Use the Claude or ChatGPT subscription you already have. No second API bill.
      - generic [ref=e33]:
        - paragraph [ref=e34]: "02"
        - paragraph [ref=e35]: Sandboxed by default. cwd jail, shell allowlist, no network surprises.
      - generic [ref=e36]:
        - paragraph [ref=e37]: "03"
        - paragraph [ref=e38]: Built on the same runtime as Voss the language. Confidence-gated planning, token budgets, episodic memory — all first-class.
    - generic [ref=e40]:
      - generic [ref=e41]:
        - paragraph [ref=e42]: A turn looks like this
        - heading "Plan, edit, run, verify." [level=2] [ref=e43]
        - paragraph [ref=e44]: Each turn is a confidence-gated plan, gated tool calls, and a verification step. You see what it's going to do before it does it.
      - code [ref=e47]:
        - generic [ref=e48]: $ voss do "add a /healthz endpoint and a test for it"
        - generic [ref=e49]: "[plan] confidence 0.92"
        - generic [ref=e50]: 1. fs_grep "FastAPI\(" → app/main.py
        - generic [ref=e51]: 2. fs_edit app/main.py → add @app.get("/healthz")
        - generic [ref=e52]: 3. fs_write tests/test_health.py → pytest case
        - generic [ref=e53]: 4. shell_run pytest tests/test_health.py -q
        - generic [ref=e54]: "[edit] app/main.py +4 -0 ✓ allow (mode=edit)"
        - generic [ref=e55]: "[write] tests/test_health.py +12 ✓ allow (mode=edit)"
        - generic [ref=e56]: "[shell] pytest tests/test_health.py -q"
        - generic [ref=e57]: 1 passed in 0.18s ✓
        - generic [ref=e58]: "done. token spend: 4,128 / budget 8,000 — saved as session 0193…"
    - generic [ref=e60]:
      - generic [ref=e61]:
        - heading "Built for AI-first builders." [level=2] [ref=e62]
        - paragraph [ref=e63]: You're shipping AI inside a product. The harness is the agent that helps you do it — without leaving the terminal, without a second subscription, without surrendering your repo.
      - generic [ref=e64]:
        - generic [ref=e65]:
          - heading "Bring your own subscription" [level=3] [ref=e66]
          - paragraph [ref=e67]: OAuth into Claude Code or Codex CLI. The harness reuses those tokens — your Pro/Max plan covers the bill, no API key required.
        - generic [ref=e68]:
          - heading "Permission modes that match how you work" [level=3] [ref=e69]
          - paragraph [ref=e70]: plan (read-only), edit (read + scoped writes), or auto (allowlisted everything). Decisions persist per-project, so you grant once and ship.
        - generic [ref=e71]:
          - heading "Real tools, not toys" [level=3] [ref=e72]
          - paragraph [ref=e73]: fs_read, fs_glob, fs_grep, fs_write, fs_edit, shell_run with an allowlist, git_status, git_diff, and voss_check. Everything jailed to your cwd.
        - generic [ref=e74]:
          - heading "Confidence-gated planning" [level=3] [ref=e75]
          - paragraph [ref=e76]: "Each turn produces a `ProbableValue<Plan>`. Low-confidence plans get rerolled, not executed. Same primitive Voss programs use — eat your own dog food."
        - generic [ref=e77]:
          - heading "Sessions you can resume" [level=3] [ref=e78]
          - paragraph [ref=e79]: Every chat persists to ~/.local/state/voss/sessions. Restart, switch machines, replay a transcript — the episodic memory comes with it.
        - generic [ref=e80]:
          - heading "Headless or interactive" [level=3] [ref=e81]
          - paragraph [ref=e82]: "`voss do \"ship the login flow\"` for one-shots. `voss chat` for the REPL. Same agent loop either way — script it in CI or babysit it locally."
