    - generic [ref=e48]:
      - generic [ref=e49]:
        - paragraph [ref=e50]: A turn looks like this
        - heading "Plan, edit, run, verify." [level=2] [ref=e51]
        - paragraph [ref=e52]: Each turn is a confidence-gated plan, permission-checked tool calls, and a validation loop. In plan mode, mutating tools are denied before they run.
      - generic [ref=e53]:
        - generic [ref=e55]: ~/voss-app - voss do
        - code [ref=e57]:
          - generic [ref=e58]: $
          - text: "voss do --mode=auto \"add a /healthz endpoint and a test for it\" [plan] confidence 0.92 1. fs_grep \"FastAPI\\(\" -> app/main.py 2. fs_edit app/main.py -> add @app.get(\"/healthz\") 3. fs_write tests/test_health.py -> pytest case 4. shell_run pytest tests/test_health.py -q [edit] app/main.py +4 -0 ✓ allow (mode=auto) [write] tests/test_health.py +12 ✓ allow (mode=auto) [shell] pytest tests/test_health.py -q 1 passed in 0.18s ✓ done. token spend: 4,128 / budget 8,000, saved as session 0193..."
    - generic [ref=e60]:
      - generic [ref=e61]:
        - heading "Built for AI-first builders." [level=2] [ref=e62]
        - paragraph [ref=e63]: You're shipping AI inside a product. The harness is the agent that helps you do it, without leaving the terminal, without a second subscription, without surrendering your repo.
      - generic [ref=e64]:
        - generic [ref=e65]:
          - heading "Bring your own subscription" [level=3] [ref=e66]
          - paragraph [ref=e67]: Use Claude Code or Codex CLI auth when available, or fall back to ANTHROPIC_API_KEY / OPENAI_API_KEY for CI and reliable provider access.
        - generic [ref=e68]:
          - heading "Permission modes that match how you work" [level=3] [ref=e69]
          - paragraph [ref=e70]: plan is read-only, edit supports scoped writes, and auto allows broader local automation through the lower-level safeguards.
        - generic [ref=e71]:
          - heading "Real tools, not toys" [level=3] [ref=e72]
          - paragraph [ref=e73]: fs_read, fs_glob, fs_grep, fs_write, fs_edit, shell_run with an allowlist, git_status, git_diff, and voss_check. Everything jailed to your cwd.
        - generic [ref=e74]:
          - heading "Confidence-gated planning" [level=3] [ref=e75]
          - paragraph [ref=e76]: "Each turn produces a `ProbableValue<Plan>`. Low-confidence plans get rerolled, not executed. It is the same primitive Voss programs use."
        - generic [ref=e77]:
          - heading "Sessions you can resume" [level=3] [ref=e78]
          - paragraph [ref=e79]: Sessions are stored per project under .voss/sessions. List them, resume by id, and keep prior runs tied to the repo.
        - generic [ref=e80]:
          - heading "Headless or interactive" [level=3] [ref=e81]
          - paragraph [ref=e82]: "`voss do \"ship the login flow\"` for one-shots. `voss chat` for the REPL. Same agent loop either way, whether scripted or supervised locally."
