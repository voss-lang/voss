name: CI

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  stub:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: voss check harness sources (M4 DOG-06)
        run: python -m voss.cli check voss/harness/agent/
      - run: python -m voss.cli check voss-demos/
      - run: pytest -q -m "not live" --cov=voss_runtime --cov-report=term-missing

  live:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: curl -fsSL http://localhost:11434/api/pull -d '{"name":"llama3.2:1b"}'
      - run: pytest -q -m live
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OLLAMA_HOST: http://localhost:11434

  npm-version-sync:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify pyproject.toml and npm/package.json versions match
        shell: bash
        run: |
          PYVER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          NPMVER=$(node -e "console.log(require('./npm/package.json').version)")
          if [ "$PYVER" != "$NPMVER" ]; then
            echo "VERSION MISMATCH: pyproject.toml=$PYVER npm/package.json=$NPMVER"
            echo "Run: python3 npm/scripts/bump_version.py"
            exit 1
          fi
          echo "Version sync OK: $PYVER"
