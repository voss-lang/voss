name: CI

# Hardening note (2026-05-13):
# Action references use tag pins (`@v4`, `@v5`). Dependabot (see
# .github/dependabot.yml) auto-PRs commit-SHA pins on the cadence configured
# there. The high-trust workflow (release.yml) carries the same policy plus a
# manual review gate on Dependabot bumps before merge.
#
# permissions: contents: read at workflow root — every job inherits least
# privilege. Jobs that need additional scopes (none today) must opt in
# explicitly per-job.

permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  stub:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - name: voss check harness sources (M4 DOG-06)
        run: python -m voss.cli check voss/harness/agent/
      - run: python -m voss.cli check voss-demos/
      - name: voss check voss/harness/skills/voss companions (T7)
        run: python -m voss.cli check voss/harness/skills/voss/
      - name: T1 grep gate — _substitute_placeholders is deleted (SPEC ITER-02)
        run: |
          if grep -rn --include='*.py' --include='*.voss' \
               "_substitute_placeholders" voss/ ; then
            echo "::error::_substitute_placeholders re-introduced — forbidden by T1 ITER-02"
            exit 1
          fi
      - run: pytest -q -m "not live" --cov=voss_runtime --cov-report=term-missing

  # WATCH-05: macOS + Linux are the gating runners for FSEvents/inotify event delivery.
  # Windows is explicitly non-gating per SPEC WATCH-05 and is intentionally excluded from this matrix.
  watch-cross-platform:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/harness/test_m14_watch.py -q -m "not live"

  dep-audit:
    # CVE surveillance on Python deps. Runs on every PR + push + the daily
    # schedule cron so a newly-disclosed CVE in a pinned transitive trips the
    # next CI run, not the next release.
    #
    # We DO NOT install the project to run pip-audit. The full dep tree
    # (torch + sentence-transformers + chromadb + scipy ~1.1 GB site-packages)
    # is heavy for a CI job whose only output is a vuln list. pip-audit
    # supports reading dependency specs directly via -P / requirements file
    # parsing; we feed it the pyproject.toml-resolved set.
    #
    # `--strict` would fail on any vuln; we run non-strict on PRs (report-only,
    # warning surfaced via ::warning::) and strict on scheduled runs so a fresh
    # CVE post-merge alerts maintainers without blocking in-flight PRs.
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
      - name: Resolve project deps
        # Resolve pyproject.toml's runtime deps into a flat requirements file
        # without actually installing them. `pip-compile` from pip-tools or
        # plain `pip install --dry-run --report` both work; we use the latter
        # for zero-extra-deps.
        run: |
          python -m pip install --dry-run --report /tmp/resolved.json -e . 2>/dev/null || true
          python -c "
          import json, sys
          try:
              data = json.load(open('/tmp/resolved.json'))
          except Exception as e:
              sys.stderr.write(f'resolve failed: {e}\n')
              sys.exit(0)
          lines = []
          for entry in data.get('install', []):
              md = entry.get('metadata', {})
              name = md.get('name')
              version = md.get('version')
              if name and version:
                  lines.append(f'{name}=={version}')
          open('/tmp/requirements-resolved.txt', 'w').write('\n'.join(lines) + '\n')
          print(f'resolved {len(lines)} deps')
          "
      - name: Run pip-audit
        run: |
          if [ ! -s /tmp/requirements-resolved.txt ]; then
            echo "::warning::dep resolution produced no file; skipping pip-audit"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "release" ]; then
            pip-audit --strict --progress-spinner off -r /tmp/requirements-resolved.txt
          else
            pip-audit --progress-spinner off -r /tmp/requirements-resolved.txt || echo "::warning::pip-audit reported advisories; see job log"
          fi

  live:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'release'
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - "11434:11434"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: pip install -e ".[dev]"
      - run: curl -fsSL http://localhost:11434/api/pull -d '{"name":"llama3.2:1b"}'
      - run: pytest -q -m live
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OLLAMA_HOST: http://localhost:11434

  npm-version-sync:
    if: github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - name: Verify pyproject.toml and npm/package.json versions match
        shell: bash
        run: |
          PYVER=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          NPMVER=$(node -e "console.log(require('./npm/package.json').version)")
          if [ "$PYVER" != "$NPMVER" ]; then
            echo "VERSION MISMATCH: pyproject.toml=$PYVER npm/package.json=$NPMVER"
            echo "Run: python3 npm/scripts/bump_version.py"
            exit 1
          fi
          echo "Version sync OK: $PYVER"
