name: MCP Integration

permissions:
  contents: read

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  mcp-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: pip install -e ".[dev]"
      - name: Write .voss/mcp.yml fixture
        run: |
          mkdir -p .voss
          cat > .voss/mcp.yml <<'YML'
          servers:
            filesystem:
              command:
                - npx
                - -y
                - '@modelcontextprotocol/server-filesystem@2026.1.14'
                - '{cwd}'
              timeout_s: 60.0
          YML
      - name: Smoke voss mcp list
        run: voss mcp list --cwd .
      - name: Smoke voss mcp call read_text_file
        run: |
          set -e
          output=$(voss mcp call filesystem read_text_file --arg "path=./README.md" --cwd .)
          echo "----- output -----"
          echo "$output"
          echo "----- end output -----"
          echo "$output" | grep -i "voss" > /dev/null
