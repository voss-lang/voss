# Dependabot configuration for Voss.
#
# Strategy: minimize PR noise while keeping security advisories fast-tracked.
#
# Cadence
#   - monthly for non-security bumps — at solo-maintainer scale, weekly
#     creates too much PR churn to review properly
#   - daily for security advisories — Dependabot fast-paths security
#     PRs regardless of `interval`, so monthly cadence does NOT delay
#     a fresh CVE response
#
# Grouping
#   - github-actions: ONE PR per cycle bundling all action bumps
#   - pip: ONE PR for minor+patch bumps; major bumps stay separate
#     (litellm, chromadb, pydantic — large semver bumps need manual review)
#   - npm root (M6 wrapper): no runtime deps; Dependabot will still PR
#     when platform subpackages get version-skewed. Keep separate to make
#     version-skew visible
#   - npm site/: grouped — docs site noise should never block code review
#
# Cooldown
#   - 3-day delay on action bumps. If a malicious tag is published and
#     yanked within 24h (the typical incident response window), Dependabot
#     never opens the PR in the first place
#
# To pause noisy ecosystems temporarily: bump that block's
# `open-pull-requests-limit` to 0 (Dependabot stops opening PRs but
# continues honoring security advisories).

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 3
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      python-security:
        applies-to: security-updates
        patterns:
          - "*"
    # Major bumps for fast-moving deps stay separate so they get manual
    # review. Each entry lands as its own PR.
    ignore:
      - dependency-name: "litellm"
        update-types: ["version-update:semver-major"]
      - dependency-name: "chromadb"
        update-types: ["version-update:semver-major"]
      - dependency-name: "sentence-transformers"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "python"

  - package-ecosystem: "npm"
    directory: "/npm"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    commit-message:
      prefix: "chore(deps-npm)"
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 3
    groups:
      site-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      site-security:
        applies-to: security-updates
        patterns:
          - "*"
    # eslint@10 currently breaks next linting through eslint-config-next's
    # transitive plugins, whose peer ranges stop at eslint@9.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps-site)"
    labels:
      - "dependencies"
      - "site"
