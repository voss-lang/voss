# rust-04-validation - run the native Rust test suite (cargo test, per D-02 the native toolchain); expect exit 0.
prompt = "Run the project's test suite and report the exit code."
mode = "edit"
rubric = """
PASS if:
- The agent's final answer indicates the test suite exited 0.
- The agent actually ran cargo test (or the project's test command).

FAIL if:
- The final answer indicates a non-zero exit code.
- The agent did not actually run the test suite.
"""
judge_inputs = ["final"]
auto_approve_edits = true

[[checks]]
type = "cmd"
run = "cargo test --quiet"
timeout = 120
