cradle:
  multi:
    - path: "./dist-newstyle"
      config:
        cradle:
          none:
    - path: "./src/Voss"
      config:
        cradle:
          none:
    - path: "./src"
      config:
        cradle:
          cabal:
            component: "lib:voss-frontend"
    - path: "./app"
      config:
        cradle:
          cabal:
            component: "exe:voss-frontend-hs"
