[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
  "aarch64-apple-darwin",
  "aarch64-unknown-linux-gnu",
  "x86_64-apple-darwin",
  "x86_64-unknown-linux-gnu",
]
# Ship the hybrid thin client (HYBRID-REFACTOR-PLAN H6). `voss-cli` is the
# superseded subprocess-bridge spike (RUST-PORT-PLAN) — kept in tree, not released.
packages = ["voss-tui"]
# A GitHub repo to push Homebrew formulas to
tap = "bm9797/homebrew-voss"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Which actions to run on pull requests
pr-run-mode = "plan"
# Path that installers should place binaries in
install-path = "~/.local/bin"
# Whether to install an updater program
install-updater = false
# Checksums to generate for each App
checksum = "sha256"
# Whether to sign macOS executables
macos-sign = true
# cargo-dist 0.31.0 reads these GitHub secrets for macOS signing:
# CODESIGN_CERTIFICATE, CODESIGN_CERTIFICATE_PASSWORD, CODESIGN_IDENTITY.
# The 07-09 checkpoint also tracks the planned notarization inputs:
# MACOS_SIGN_CERT_BASE64, MACOS_SIGN_CERT_PASSWORD, APPLE_NOTARY_USERNAME,
# APPLE_NOTARY_PASSWORD.

[dist.github-custom-runners]
aarch64-apple-darwin = "macos-14"
x86_64-apple-darwin = "macos-13"
