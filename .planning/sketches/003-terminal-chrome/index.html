<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sketch 003 — Terminal Chrome</title>
<link rel="stylesheet" href="../themes/default.css">
<style>
  /* ── Layout ─────────────────────────────────────────── */
  html, body { height: 100%; overflow: hidden; }
  body { display: flex; flex-direction: column; user-select: none; }

  /* ── Titlebar ───────────────────────────────────────── */
  .titlebar {
    height: var(--titlebar-h);
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    flex-shrink: 0;
    position: relative;
    -webkit-app-region: drag;
  }
  .traffic-lights {
    display: flex;
    gap: 8px;
    align-items: center;
    -webkit-app-region: no-drag;
  }
  .traffic-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
  }
  .traffic-dot.close { background: #ff5f57; }
  .traffic-dot.minimize { background: #febc2e; }
  .traffic-dot.maximize { background: #28c840; }
  .titlebar-label {
    position: absolute;
    left: 50%; transform: translateX(-50%);
    font-family: var(--font-ui);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg-1);
    letter-spacing: 0.02em;
  }

  /* ── Variant Tabs ───────────────────────────────────── */
  .variant-tabs {
    height: var(--tabbar-h);
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    padding: 0 12px;
    gap: 2px;
    flex-shrink: 0;
  }
  .variant-tab {
    font-family: var(--font-ui);
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-2);
    background: transparent;
    border: none;
    padding: 0 16px;
    cursor: pointer;
    position: relative;
    transition: color var(--ease-fast);
    letter-spacing: 0.01em;
  }
  .variant-tab:hover { color: var(--fg-1); }
  .variant-tab.active {
    color: var(--fg-0);
  }
  .variant-tab.active::after {
    content: "";
    position: absolute;
    bottom: 0; left: 8px; right: 8px;
    height: 2px;
    background: var(--focus);
    border-radius: 1px 1px 0 0;
  }

  /* ── Grid Container ─────────────────────────────────── */
  .grid-area {
    flex: 1;
    display: none;
    min-height: 0;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
  }
  .grid-area.active { display: grid; }

  /* ── Status Bar ─────────────────────────────────────── */
  .statusbar {
    height: var(--statusbar-h);
    background: var(--bg-1);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    font-family: var(--font-ui);
    font-size: 11px;
    color: var(--fg-2);
    gap: 16px;
    flex-shrink: 0;
  }
  .statusbar .sep { color: var(--fg-3); }

  /* ── Sketch Toolbar ─────────────────────────────────── */
  .sketch-toolbar {
    position: fixed;
    bottom: 36px; right: 14px;
    display: flex;
    gap: 6px;
    z-index: 100;
  }
  .sketch-toolbar button {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 4px 10px;
    background: var(--bg-2);
    color: var(--fg-2);
    border: 1px solid var(--border-bright);
    cursor: pointer;
    transition: all var(--ease-fast);
  }
  .sketch-toolbar button:hover {
    background: var(--bg-3);
    color: var(--fg-0);
  }

  /* ════════════════════════════════════════════════════════
     PANE BASE
     ════════════════════════════════════════════════════════ */
  .pane {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg-0);
    cursor: pointer;
    position: relative;
  }
  .pane-header {
    height: var(--pane-header-h);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 8px;
    flex-shrink: 0;
    font-family: var(--font-ui);
    font-size: 11px;
    font-weight: 500;
    color: var(--fg-1);
  }
  .pane-header .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pane-header .label { white-space: nowrap; }
  .pane-header .cwd {
    color: var(--fg-3);
    font-family: var(--font-mono);
    font-size: 10px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pane-header .spacer { flex: 1; }
  .pane-header .meta {
    color: var(--fg-3);
    font-family: var(--font-mono);
    font-size: 10px;
    white-space: nowrap;
    display: flex;
    gap: 10px;
  }
  .pane-content {
    flex: 1;
    overflow-y: auto;
    padding: 6px 10px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.55;
    color: var(--fg-0);
    tab-size: 4;
  }
  .pane-content .line { white-space: pre-wrap; word-break: break-all; }
  .pane-content .dim { color: var(--fg-2); }
  .pane-content .dimmer { color: var(--fg-3); }
  .pane-content .green { color: var(--accent-green); }
  .pane-content .cyan { color: var(--accent-cyan); }
  .pane-content .amber { color: var(--accent-amber); }
  .pane-content .red { color: var(--accent-red); }
  .pane-content .orange { color: var(--accent-orange); }
  .pane-content .bright { color: var(--fg-0); }
  .pane-content .prompt-user { color: var(--accent-green); }
  .pane-content .prompt-agent { }
  .pane-content .tool-call {
    padding: 2px 6px;
    margin: 2px 0;
    border-left: 2px solid var(--fg-3);
  }

  /* streaming cursor */
  .stream-cursor {
    display: inline-block;
    width: 7px; height: 14px;
    background: var(--focus);
    vertical-align: text-bottom;
    animation: blink 1s steps(2) infinite;
    margin-left: 1px;
  }

  /* pulsing dot for streaming */
  @keyframes pulse-streaming {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.55; transform: scale(0.85); }
  }
  .dot.streaming {
    animation: pulse-streaming 1.5s ease-in-out infinite;
  }

  /* ════════════════════════════════════════════════════════
     VARIANT A — Warm Mono
     ════════════════════════════════════════════════════════ */
  #variant-a .pane {
    border: 1px solid var(--border);
    transition: background var(--ease-fast), border-color var(--ease-fast);
  }
  /* Collapse duplicate borders in grid */
  #variant-a .pane { margin: -0.5px; border-width: 1px; }
  #variant-a .pane-header {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    transition: background var(--ease-fast);
  }
  #variant-a .pane-header:hover {
    background: var(--bg-2);
  }
  #variant-a .pane.focused {
    border-color: var(--border-bright);
    background: var(--bg-1);
  }
  #variant-a .pane.focused .pane-header {
    background: var(--bg-2);
  }
  /* scrollbar thin warm */
  #variant-a .pane-content::-webkit-scrollbar { width: 6px; }
  #variant-a .pane-content::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

  /* Status bar A */
  #variant-a ~ .statusbar-a .active-agent { }

  /* ════════════════════════════════════════════════════════
     VARIANT B — Warm Accent
     ════════════════════════════════════════════════════════ */
  #variant-b .pane {
    border: 1px solid var(--border);
    transition: background var(--ease-base), border-color var(--ease-base);
    position: relative;
  }
  #variant-b .pane { margin: -0.5px; }
  #variant-b .pane-header {
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    padding-left: 0;
    transition: background var(--ease-fast);
  }
  #variant-b .pane-header .accent-bar {
    display: block;
    width: 3px;
    height: 100%;
    flex-shrink: 0;
    border-radius: 0;
  }
  #variant-b .pane-header:hover {
    background: var(--bg-2);
  }
  #variant-b .pane.focused {
    border-color: var(--border-bright);
    background: var(--bg-0);
  }
  #variant-b .pane.focused::before {
    content: "";
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 3px;
    background: var(--focus);
    z-index: 2;
  }
  #variant-b .pane.focused .pane-content {
    background: var(--focus-soft);
  }
  /* cost warning */
  #variant-b .meta .cost-warn { color: var(--focus); }
  /* agent output tint */
  #variant-b .agent-block {
    background: var(--focus-soft);
    padding: 3px 6px;
    margin: 2px 0;
  }
  /* status bar B highlight */
  .statusbar .active-agent-highlight { color: var(--focus); font-weight: 600; }

  /* ════════════════════════════════════════════════════════
     VARIANT C — Warm Glow
     ════════════════════════════════════════════════════════ */
  #variant-c .pane {
    border: 1px solid var(--border);
    transition: all 150ms ease;
    position: relative;
    margin: -0.5px;
  }
  #variant-c .pane-header {
    background: rgba(19, 17, 16, 0.92);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 150ms ease;
    z-index: 1;
  }
  #variant-c .pane-header:hover {
    background: rgba(26, 23, 20, 0.95);
  }
  #variant-c .pane-header .dot {
    width: 8px; height: 8px;
  }
  /* focused glow */
  #variant-c .pane.focused {
    border-color: rgba(255, 91, 31, 0.25);
    box-shadow: 0 0 18px rgba(255, 91, 31, 0.12), 0 0 4px rgba(255, 91, 31, 0.08);
    z-index: 1;
  }
  /* active dot glow ring */
  #variant-c .dot.active-glow {
    box-shadow: 0 0 0 3px rgba(255, 91, 31, 0.2);
  }
  /* streaming pane top glow */
  #variant-c .pane.streaming-pane::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: radial-gradient(ellipse 80% 50px at 50% 0%, rgba(255,91,31,0.10), transparent);
    pointer-events: none;
    z-index: 0;
  }
  /* streaming line glow underline */
  #variant-c .glow-line {
    text-decoration: underline;
    text-decoration-color: rgba(255, 91, 31, 0.35);
    text-underline-offset: 3px;
  }
  /* shadow bleed on focused borders */
  #variant-c .pane.focused {
    border-color: rgba(255, 91, 31, 0.18);
  }
  /* all transitions 150ms */
  #variant-c .pane * { transition: all 150ms ease; }

</style>
</head>

// ── Render Helpers ─────────────────────────────────────

function renderPaneA(p) {
  const focusCls = p.id === "planner" ? " focused" : "";
  const streamDot = p.streaming ? " streaming" : "";
  const lines = p.lines.map(l => {
    if (l.cls === "stream") {
      return `<div class="line">${esc(l.text)}<span class="stream-cursor"></span></div>`;
    }
    const cls = l.cls ? ` class="${l.cls}"` : "";
    return `<div class="line"><span${cls}>${esc(l.text) || "&nbsp;"}</span></div>`;
  }).join("");
  const iterCost = (p.iter || p.cost)
    ? `<span class="meta">${p.iter ? `<span>${p.iter}</span>` : ""}${p.cost ? `<span>${p.cost}</span>` : ""}</span>`
    : "";
  return `<div class="pane${focusCls}" data-pane="${p.id}">
    <div class="pane-header">
      <div class="dot${streamDot}" style="background:${p.roleColor}"></div>
      <span class="label">${p.label}</span>
      <span class="cwd">${p.cwd}</span>
      <span class="spacer"></span>
      ${iterCost}
    </div>
    <div class="pane-content">${lines}</div>
  </div>`;
}

function renderPaneB(p) {
  const focusCls = p.id === "planner" ? " focused" : "";
  const streamDot = p.streaming ? " streaming" : "";
  const costWarn = p.costPct > 0.5 ? " cost-warn" : "";
  const lines = p.lines.map(l => {
    // Agent output blocks get tint
    const isAgent = (l.cls === "orange" || l.cls === "") && p.role !== "user" && p.role !== "watcher" && l.text && !l.text.startsWith("❯");
    const wrapStart = isAgent && l.cls === "" && l.text.length > 0 ? '<div class="agent-block">' : '';
    const wrapEnd = isAgent && l.cls === "" && l.text.length > 0 ? '</div>' : '';
    if (l.cls === "stream") {
      return `<div class="agent-block"><div class="line">${esc(l.text)}<span class="stream-cursor"></span></div></div>`;
    }
    const cls = l.cls ? ` class="${l.cls}"` : "";
    if (wrapStart) {
      return `${wrapStart}<div class="line"><span${cls}>${esc(l.text) || "&nbsp;"}</span></div>${wrapEnd}`;
    }
    return `<div class="line"><span${cls}>${esc(l.text) || "&nbsp;"}</span></div>`;
  }).join("");
  const iterCost = (p.iter || p.cost)
    ? `<span class="meta">${p.iter ? `<span>${p.iter}</span>` : ""}${p.cost ? `<span class="${costWarn}">${p.cost}</span>` : ""}</span>`
    : "";
  return `<div class="pane${focusCls}" data-pane="${p.id}">
    <div class="pane-header">
      <div class="accent-bar" style="background:${p.roleColor}"></div>
      <div class="dot${streamDot}" style="background:${p.roleColor}"></div>
      <span class="label">${p.label}</span>
      <span class="cwd">${p.cwd}</span>
      <span class="spacer"></span>
      ${iterCost}
    </div>
    <div class="pane-content">${lines}</div>
  </div>`;
}

function renderPaneC(p) {
  const focusCls = p.id === "planner" ? " focused" : "";
  const streamCls = p.streaming ? " streaming-pane" : "";
  const streamDot = p.streaming ? " streaming" : "";
  const glowDot = (p.id === "planner") ? " active-glow" : "";
  const lines = p.lines.map((l, i) => {
    const isLast = l.cls === "stream";
    if (isLast) {
      return `<div class="line glow-line">${esc(l.text)}<span class="stream-cursor"></span></div>`;
    }
    // Last non-empty line of streaming pane gets glow
    const cls = l.cls ? ` class="${l.cls}"` : "";
    return `<div class="line"><span${cls}>${esc(l.text) || "&nbsp;"}</span></div>`;
  }).join("");
  const iterCost = (p.iter || p.cost)
    ? `<span class="meta">${p.iter ? `<span>${p.iter}</span>` : ""}${p.cost ? `<span>${p.cost}</span>` : ""}</span>`
    : "";
  return `<div class="pane${focusCls}${streamCls}" data-pane="${p.id}">
    <div class="pane-header">
      <div class="dot${streamDot}${glowDot}" style="background:${p.roleColor}"></div>
      <span class="label">${p.label}</span>
      <span class="cwd">${p.cwd}</span>
      <span class="spacer"></span>
      ${iterCost}
    </div>
    <div class="pane-content">${lines}</div>
  </div>`;
}

function esc(t) {
  return t.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// ── Build All Grids ────────────────────────────────────
function buildGrids() {
  const a = document.getElementById("variant-a");
  const b = document.getElementById("variant-b");
  const c = document.getElementById("variant-c");
  a.innerHTML = PANES.map(renderPaneA).join("");
  b.innerHTML = PANES.map(renderPaneB).join("");
  c.innerHTML = PANES.map(renderPaneC).join("");
  bindPaneClicks();
}

// ── Focus Logic ────────────────────────────────────────
function bindPaneClicks() {
  document.querySelectorAll(".pane").forEach(pane => {
    pane.addEventListener("click", () => {
      const grid = pane.closest(".grid-area");
      grid.querySelectorAll(".pane").forEach(p => p.classList.remove("focused"));
      pane.classList.add("focused");
    });
  });
}

// ── Variant Switching ──────────────────────────────────
let currentVariant = "a";

function switchVariant(v) {
  currentVariant = v;
  document.querySelectorAll(".grid-area").forEach(g => g.classList.remove("active"));
  document.getElementById("variant-" + v).classList.add("active");
  document.querySelectorAll(".variant-tab").forEach(t => t.classList.remove("active"));
  document.querySelector(`.variant-tab[data-variant="${v}"]`).classList.add("active");
  // Update statusbar agent styling
  updateStatusbar(v);
}

function updateStatusbar(v) {
  const agentEl = document.getElementById("statusbar-agent");
  if (v === "b") {
    agentEl.className = "active-agent active-agent-highlight";
  } else {
    agentEl.className = "active-agent";
  }
}

function cycleVariant(dir) {
  const variants = ["a", "b", "c"];
  let idx = variants.indexOf(currentVariant) + dir;
  if (idx < 0) idx = variants.length - 1;
  if (idx >= variants.length) idx = 0;
  switchVariant(variants[idx]);
}

function resetFocus() {
  document.querySelectorAll(".pane").forEach(p => p.classList.remove("focused"));
  // Re-focus planner by default
  document.querySelectorAll('.pane[data-pane="planner"]').forEach(p => p.classList.add("focused"));
}

// ── Tab click handlers ─────────────────────────────────
document.querySelectorAll(".variant-tab").forEach(tab => {
  tab.addEventListener("click", () => switchVariant(tab.dataset.variant));
});

// ── Keyboard shortcuts ─────────────────────────────────
document.addEventListener("keydown", e => {
  if (e.key === "1") switchVariant("a");
  if (e.key === "2") switchVariant("b");
  if (e.key === "3") switchVariant("c");
  if (e.key === "ArrowLeft") cycleVariant(-1);
  if (e.key === "ArrowRight") cycleVariant(1);
});

// ── Init ───────────────────────────────────────────────
buildGrids();
</script>
</body>
</html>
